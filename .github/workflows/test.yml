name: Avtomatik Testler (CI)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-et:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Kodları GitHub-dan kopyala
      uses: actions/checkout@v3

    - name: 2. Python mühitini qur
      uses: actions/setup-python@v4
      with:
        python-version: "3.10" # Bura öz versiyanı yaz (məsələn 3.12)

    - name: 3. Kitabxanaları yüklə və Yoxla
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip list

    - name: 4. Testləri işə sal!
      env :
        SECRET_KEY: "1Key"
      run: |
        python3 -m pytest -p no:warnings